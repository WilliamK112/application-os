name: CI

on:
  push:
    paths:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: application_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d application_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/application_os?schema=public
      AUTH_SECRET: ci-auth-secret
      AUTH_TRUST_HOST: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run prisma:seed

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build
